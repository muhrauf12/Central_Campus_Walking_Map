<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UM Central Campus Walking Map</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>University of Michigan — Central Campus Walking Map</h1>
</header>

<div id="main">
  <div id="mapWrapper">
    <canvas id="mapCanvas"></canvas>
    <div id="toast"></div>

    <div id="adminPanel">
      <div class="admin-title">Admin Mode</div>
      <div class="admin-row">
        <button class="admin-btn on" id="paintBtn" onclick="setAdminTool('paint')">Paint</button>
        <button class="admin-btn"   id="eraseBtn"  onclick="setAdminTool('erase')">Erase</button>
      </div>
      <div class="admin-field">
        <span>Size</span>
        <input type="range" id="brushSlider" min="0" max="12" value="3">
        <span class="val" id="brushLabel">3</span>
      </div>
      <div class="admin-row">
        <button class="admin-btn" onclick="undoLastStroke()">Undo</button>
        <button class="admin-btn" style="color:#f87171" onclick="clearAllBlocked()">Clear</button>
      </div>
      <div id="savedBadge">Saved</div>
      <button class="admin-export-btn" onclick="exportConfig()">Export Config</button>
      <textarea id="exportBox" placeholder="Config string appears here…" readonly></textarea>
      <button class="admin-btn" style="width:100%;margin-top:-3px" onclick="copyExport()">Copy</button>
      <div class="admin-note">Zones auto-save here. Export only needed for server deploy.</div>
    </div>
  </div>

  <div id="sidebar">
    <button class="pin-btn" id="startBtn" onclick="selectPinMode('start')">
      <div class="dot" style="background:#22c55e"></div>Start
    </button>
    <button class="pin-btn" id="endBtn" onclick="selectPinMode('end')">
      <div class="dot" style="background:#ef4444"></div>End
    </button>

    <div id="routeResult" aria-live="polite"></div>

    <button class="clear-btn" onclick="resetRoute()">Clear route</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
